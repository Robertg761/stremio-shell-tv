name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Build
        run: pnpm build
      - name: Contract tests
        run: pnpm test:contracts
      - name: Web unit tests
        run: pnpm test:web
      - name: TV smoke tests
        run: pnpm test:tv-smoke

  android-host:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build web assets
        run: |
          pnpm --filter @stremio-shell/core-bridge build
          pnpm android:web-build
      - name: Android JVM tests and debug assemble
        run: |
          cd apps/android-tv-host
          chmod +x ./gradlew
          ./gradlew :app:testDebugUnitTest :app:assembleDebug
      - name: Upload Android host artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-host
          path: |
            apps/android-tv-host/app/build/outputs/apk/debug/*.apk
            apps/android-tv-host/app/build/reports/tests/testDebugUnitTest/
          if-no-files-found: ignore

  android-tv-instrumentation:
    runs-on: ubuntu-latest
    needs: [validate]
    # Emulator 36.6.11 on current runner images dumps core shortly after
    # launch with every headless renderer (swiftshader_indirect, swangle,
    # guest). Non-blocking until a fixed emulator ships in the runner image;
    # the authoritative instrumentation gate is a local TV emulator run
    # (see docs/tv-qa-matrix.md), which passes with -gpu host.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        api-level: [26, 34]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build web assets
        run: |
          pnpm --filter @stremio-shell/core-bridge build
          pnpm android:web-build
      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run Android TV instrumentation
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: android-tv
          arch: x86
          profile: tv_1080p
          emulator-boot-timeout: 900
          # Host software renderers (swiftshader_indirect, swangle_indirect)
          # segfault in emulator 36.6.11 on GitHub runners; guest-side
          # rendering avoids the host render pipeline entirely.
          emulator-options: -no-window -gpu guest -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          script: |
            cd apps/android-tv-host
            chmod +x ./gradlew
            ./gradlew :app:connectedDebugAndroidTest
      - name: Upload instrumentation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-tv-instrumentation-api-${{ matrix.api-level }}
          path: |
            apps/android-tv-host/app/build/reports/androidTests/connected/
            apps/android-tv-host/app/build/outputs/androidTest-results/connected/
          if-no-files-found: ignore
