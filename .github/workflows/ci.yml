name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Build
        run: pnpm build
      - name: Contract tests
        run: pnpm test:contracts
      - name: TV smoke tests
        run: pnpm test:tv-smoke

  android-host:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build web assets
        run: |
          pnpm --filter @stremio-shell/core-bridge build
          pnpm android:web-build
      - name: Android JVM tests and debug assemble
        run: |
          cd apps/android-tv-host
          chmod +x ./gradlew
          ./gradlew :app:testTvDebugUnitTest :app:assembleTvDebug
      - name: Upload Android host artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-host
          path: |
            apps/android-tv-host/app/build/outputs/apk/tv/debug/*.apk
            apps/android-tv-host/app/build/reports/tests/testTvDebugUnitTest/
          if-no-files-found: ignore

  android-tv-instrumentation:
    runs-on: ubuntu-latest
    needs: [validate]
    strategy:
      fail-fast: false
      matrix:
        api-level: [26, 34]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build web assets
        run: |
          pnpm --filter @stremio-shell/core-bridge build
          pnpm android:web-build
      - name: Run Android TV instrumentation
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: google_apis
          arch: x86_64
          profile: tv_1080p
          disable-animations: true
          script: |
            cd apps/android-tv-host
            chmod +x ./gradlew
            ./gradlew :app:connectedTvDebugAndroidTest
      - name: Upload instrumentation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-tv-instrumentation-api-${{ matrix.api-level }}
          path: |
            apps/android-tv-host/app/build/reports/androidTests/connected/
            apps/android-tv-host/app/build/outputs/androidTest-results/connected/
          if-no-files-found: ignore
