name: Release

on:
  push:
    branches: [ main ]
    paths:
      - "apps/android-tv-host/app/build.gradle.kts"
      - "CHANGELOG.md"
      - "scripts/get_version.js"
      - "scripts/extract_changelog_section.js"
      - ".github/workflows/release.yml"
  workflow_dispatch:
    inputs:
      prerelease:
        description: "Publish as GitHub prerelease"
        required: true
        type: boolean
        default: true
      tag_suffix:
        description: "Optional tag suffix (example: beta.1)"
        required: false
        type: string
        default: "beta.1"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Read Version
        id: ver
        run: node scripts/get_version.js

      - name: Compute Release Metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version_name }}"

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            SUFFIX="${{ inputs.tag_suffix }}"
            PRERELEASE="${{ inputs.prerelease }}"
          else
            SUFFIX=""
            PRERELEASE="false"
          fi

          if [ -n "$SUFFIX" ]; then
            TAG_NAME="v${VERSION}-${SUFFIX}"
            RELEASE_NAME="$TAG_NAME"
          else
            TAG_NAME="v${VERSION}"
            RELEASE_NAME="$TAG_NAME"
          fi

          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Skip If Release Already Exists
        id: exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.tag_name }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release already exists for $TAG; skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Web Assets
        if: steps.exists.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          pnpm --filter @stremio-shell/core-bridge build
          pnpm android:web-build

      - name: Prepare Release Signing
        if: steps.exists.outputs.skip != 'true'
        shell: bash
        env:
          SS_SIGNING_STORE_BASE64: ${{ secrets.SS_SIGNING_STORE_BASE64 }}
          SS_SIGNING_STORE_PASSWORD: ${{ secrets.SS_SIGNING_STORE_PASSWORD }}
          SS_SIGNING_KEY_ALIAS: ${{ secrets.SS_SIGNING_KEY_ALIAS }}
          SS_SIGNING_KEY_PASSWORD: ${{ secrets.SS_SIGNING_KEY_PASSWORD }}
          SS_SIGNING_STORE_TYPE: ${{ secrets.SS_SIGNING_STORE_TYPE }}
        run: |
          set -euo pipefail

          missing=()
          for name in SS_SIGNING_STORE_BASE64 SS_SIGNING_STORE_PASSWORD SS_SIGNING_KEY_ALIAS SS_SIGNING_KEY_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required release signing secret(s): %s\n' "${missing[*]}" >&2
            exit 1
          fi

          SIGNING_DIR="$RUNNER_TEMP/stremio-shell-signing"
          mkdir -p "$SIGNING_DIR"
          SIGNING_STORE_FILE="$SIGNING_DIR/release.keystore"
          printf '%s' "$SS_SIGNING_STORE_BASE64" | base64 --decode > "$SIGNING_STORE_FILE"

          {
            echo "SS_SIGNING_STORE_FILE=$SIGNING_STORE_FILE"
            echo "SS_SIGNING_STORE_PASSWORD=$SS_SIGNING_STORE_PASSWORD"
            echo "SS_SIGNING_KEY_ALIAS=$SS_SIGNING_KEY_ALIAS"
            echo "SS_SIGNING_KEY_PASSWORD=$SS_SIGNING_KEY_PASSWORD"
            if [ -n "${SS_SIGNING_STORE_TYPE:-}" ]; then
              echo "SS_SIGNING_STORE_TYPE=$SS_SIGNING_STORE_TYPE"
            fi
          } >> "$GITHUB_ENV"

      - name: Build Release APKs
        if: steps.exists.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          cd apps/android-tv-host
          chmod +x ./gradlew
          ./gradlew :app:assembleTvRelease

      - name: Verify Release APK Signature
        if: steps.exists.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          TV_APK="$(ls -1 apps/android-tv-host/app/build/outputs/apk/tv/release/*.apk | head -n 1)"
          if [ -z "$TV_APK" ]; then
            echo "Could not locate tv release APK output."
            exit 1
          fi

          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -n 1)"
          if [ -z "$APKSIGNER" ]; then
            echo "Could not locate Android apksigner."
            exit 1
          fi

          "$APKSIGNER" verify --print-certs "$TV_APK"

      - name: Prepare Dist
        if: steps.exists.outputs.skip != 'true'
        id: dist
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version_name }}"
          mkdir -p dist

          TV_APK="$(ls -1 apps/android-tv-host/app/build/outputs/apk/tv/release/*.apk | head -n 1)"
          if [ -z "$TV_APK" ]; then
            echo "Could not locate tv release APK output."
            exit 1
          fi

          OUT_TV="dist/StremioShell-tv-${VERSION}.apk"
          cp "$TV_APK" "$OUT_TV"

          {
            echo "apk_files<<EOF"
            echo "$OUT_TV"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Extract Release Notes
        if: steps.exists.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          node scripts/extract_changelog_section.js "${{ steps.ver.outputs.version_name }}" > dist/release-notes.md

      - name: Create GitHub Release
        if: steps.exists.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          body_path: dist/release-notes.md
          files: ${{ steps.dist.outputs.apk_files }}
          draft: false
          prerelease: ${{ steps.meta.outputs.prerelease }}
